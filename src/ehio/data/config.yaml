# ehio configuration file
# Edit this file with: ehio config --edit
# All values can also be overridden with CLI flags.

# Airtable personal access token
# Provide via the AIRTABLE_TOKEN environment variable or the --airtable-token flag.
# Do NOT store the token here.

# ---- Airtable database structure ------------------------------------------
# Two bases and six tables define the full database layout.
# Preprocessing and binning read from EHI_BASE; quantifying reads from MAG_BASE.
# Binning output also writes MAG metadata to MAG_BASE.

EHI_BASE:    "appQpr6MxnaiVHsHy"   # EHI database
MAG_BASE:    "appWbHBNLE6iAsMRV"   # MAG database

EHI_PPR_BATCH:  "tbl1l5mAkF9nVtisn"  # Preprocessing batch table (EHI_BASE)
EHI_PPR_ENTRY:  "tblJfLRU2FIVz37Y1"  # Preprocessing entry table (EHI_BASE)
EHI_ASB_BATCH:  "tbld5JHhN4cM9P5ka"  # Assembly/binning batch table (EHI_BASE)
EHI_ASB_ENTRY:  "tblG6ZIvkYN844I97"  # Assembly/binning entry table (EHI_BASE)
EHI_GENOME:     "tbl7QOk2HKrZatIfG"  # Reference genome table (MAG_BASE)
MAG_DMB_BATCH:  "tblvPsCiNanM7NeQp"  # Dereplication/mapping batch table (MAG_BASE)
MAG_DMB_ENTRY:  "tblWDyQmM9rQ9wq57"  # Dereplication/mapping entry table (MAG_BASE)
MAG_ENTRY: "tblMzd3oyaJhdeQcs"       # MAG genome table (MAG_BASE)

