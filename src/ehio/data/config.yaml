# ---- SFTP settings --------------------------------------------------------
SFTP_HOST: "io.erda.dk"
SFTP_USER: "antton.alberdi@snm.ku.dk"
SFTP_PORT: 22
SFTP_IDENTITY: ""                    # Path to SSH private key (leave empty to use SSH agent)

# Remote paths are built at runtime as {SFTP_REMOTE_BASE}/{PREFIX}/{batch_code}:
#   preprocessing  →  {SFTP_REMOTE_BASE}/PPR/{EHI_PPR_BATCH_CODE}
#   binning        →  {SFTP_REMOTE_BASE}/ASB/{EHI_ASB_BATCH_CODE}   (assembly products)
#                     {SFTP_REMOTE_BASE}/MAG/{EHI_ASB_BATCH_CODE}   (MAG files)
#   quantifying    →  {SFTP_REMOTE_BASE}/DMB/{MAG_DMB_BATCH_CODE}
SFTP_REMOTE_BASE: "/EarthHologenomeInitiative/Data"

# ---- Local HPC directories (used by scanning) ----------------------------
# Data output dirs — where drakkar writes its results (-o flag):
#   preprocessing  →  {EHI_PPR_OUTPUT_BASE}/{EHI_PPR_BATCH_CODE}
#   binning        →  {EHI_ASB_OUTPUT_BASE}/{EHI_ASB_BATCH_CODE}
#   quantifying    →  {MAG_DMB_OUTPUT_BASE}/{MAG_DMB_BATCH_CODE}
EHI_PPR_OUTPUT_BASE: "/projects/ehi/data/PPR"
EHI_ASB_OUTPUT_BASE: "/projects/ehi/data/ASB"
MAG_DMB_OUTPUT_BASE: "/projects/ehi/data/DMB"

# Run dir — where each screen session is launched from:
#   {RUN_BASE}/{batch_code}  (contains samples.tsv, .snakemake, logs)
RUN_BASE: "/projects/ehi/data/RUN"

# ---- Scanning module ------------------------------------------------------
SCANNING_TRIGGER_STATUS: "Ready"     # Batch status value that triggers a launch
SCANNING_RESUME_STATUS: "Resume"     # Same as Ready — signals an error was fixed and the job should continue from the Snakemake checkpoint
SCANNING_RERUN_STATUS: "Rerun"       # Deletes the run and output directories and starts from scratch
SCANNING_LAUNCHED_STATUS: "Running"  # Status written back to the batch record after launching
SCANNING_STOPPED_STATUS: "Stopped"  # Status written when a running batch is killed via ehio stop
PROCESSING_DONE_STATUS: "Done"       # Status written back to the batch record after output processing completes
PROCESSING_ERROR_STATUS: "Error"     # Status written back to the batch record if drakkar fails
CLEANUP_OUTPUT_DIR: "false"           # Delete the output directory (PPR/ASB/DMB batch folder) after successful transfer (true/false)

DRAKKAR_PROFILE: "slurm"             # Drakkar workflow profile passed to every drakkar command
DRAKKAR_PPR_FRACTION: "true"         # Pass --fraction to drakkar preprocessing (run SingleM microbial fraction)
DRAKKAR_PPR_NONPAREIL: "true"        # Pass --nonpareil to drakkar preprocessing (run Nonpareil coverage estimation)
EHIO_CONDA_ENV: "/projects/alberdilab/data/environments/conda/ehio"              # Conda environment that provides the ehio command (leave empty to skip activation)
DRAKKAR_CONDA_ENV: "/projects/alberdilab/data/environments/conda/drakkar"        # Conda environment that provides the drakkar command (leave empty to skip activation)
